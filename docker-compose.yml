# ─────────────────────────────────────────────────────────────────────────────
# ScoutPrice – Root Docker Compose
# Orchestrates: Backend API · React Frontend · Nginx Proxy · MongoDB · Redis
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: scoutprice_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: scoutprice
      MONGO_INITDB_ROOT_PASSWORD: scoutprice_secret
      MONGO_INITDB_DATABASE: scoutprice
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - scoutprice_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: scoutprice_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass scoutprice_redis_secret
    volumes:
      - redis_data:/data
    networks:
      - scoutprice_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "scoutprice_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: scoutprice_elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - scoutprice_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cat/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scoutprice_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://scoutprice:scoutprice_secret@mongo:27017/scoutprice?authSource=admin
      REDIS_URL: redis://:scoutprice_redis_secret@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_abc123xyz
      JWT_EXPIRE: 30d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: http://localhost
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scoutprice_net
    volumes:
      - ./backend/logs:/app/logs

  # ── Frontend (React/Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scoutprice_frontend
    restart: unless-stopped
    networks:
      - scoutprice_net
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: scoutprice_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - scoutprice_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local
  nginx_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  scoutprice_net:
    driver: bridge

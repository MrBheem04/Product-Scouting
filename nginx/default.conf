# ─────────────────────────────────────────────────────────────────────────────
# Nginx – ScoutPrice Virtual Host Configuration
# Routes: API → backend:5000  |  Frontend → frontend:80
# Includes WebSocket upgrade for Socket.io
# ─────────────────────────────────────────────────────────────────────────────

upstream backend_api {
    server backend:5000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
    keepalive 16;
}

# ── HTTP Server (port 80) ─────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── API Routes ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts for long-running scraper requests
        proxy_connect_timeout  60s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        # CORS handled by backend – no duplicates needed
    }

    # ── Search API Rate Limit (stricter) ────────────────────────────────────
    location /api/products/search {
        limit_req zone=search burst=5 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Socket.io (WebSocket) ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # WebSocket timeouts
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Health Check ────────────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend_api/api/health;
    }

    # ── Static Frontend (React SPA) ─────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SPA fallback
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend_app;
    }

    # ── Static Asset Caching ────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass         http://frontend_app;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Upload size ─────────────────────────────────────────────────────────
    client_max_body_size 10m;
}
